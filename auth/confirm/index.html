<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RecipeBox AI - Email Confirmation</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            text-align: center;
            max-width: 400px;
            width: 100%;
        }
        .logo {
            font-size: 2em;
            font-weight: bold;
            color: #667eea;
            margin-bottom: 20px;
        }
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .manual-link {
            margin-top: 20px;
            padding: 12px 24px;
            background: #667eea;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            display: inline-block;
            font-weight: 500;
        }
        .manual-link:hover {
            background: #5a6fd8;
        }
        .store-links {
            margin-top: 30px;
        }
        .store-link {
            display: inline-block;
            margin: 10px;
            padding: 10px 20px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 500;
            color: white;
        }
        .ios { background: #007AFF; }
        .android { background: #34A853; }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">🍳 RecipeBox AI</div>
        <h2 id="title">Confirming your email...</h2>
        <div class="spinner" id="spinner"></div>
        <p id="message">You will be redirected to the app shortly.</p>
        <a href="#" id="manual-link" class="manual-link" style="display: none;">Open in App</a>
        <div id="store-links" class="store-links" style="display: none;">
            <p>Don't have the app yet?</p>
            <a href="https://apps.apple.com/app/id6474084187" class="store-link ios">Download for iOS</a>
        </div>
    </div>

    <script>
        // Get URL parameters
        const urlParams = new URLSearchParams(window.location.search);
        const tokenHash = urlParams.get('token_hash');
        const type = urlParams.get('type') || 'signup';
        
        // Create deep link
        const deepLink = `stage4.recipebox-ai-v5://auth/callback?token_hash=${tokenHash}&type=${type}`;
        
        // Set manual link
        const manualLink = document.getElementById('manual-link');
        manualLink.href = deepLink;
        
        // Detect device
        const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
        const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
        const isAndroid = /Android/.test(navigator.userAgent);
        
        function showSuccess() {
            document.getElementById('spinner').style.display = 'none';
            document.getElementById('title').textContent = 'Email Confirmed!';
            document.getElementById('message').textContent = 'Opening RecipeBox AI...';
        }
        
        function showFallback() {
            document.getElementById('spinner').style.display = 'none';
            document.getElementById('title').textContent = 'Almost there!';
            document.getElementById('message').textContent = 'Tap the button below to open the app:';
            document.getElementById('manual-link').style.display = 'inline-block';
            document.getElementById('store-links').style.display = 'block';
        }
        
        function showError(message) {
            document.getElementById('spinner').style.display = 'none';
            document.getElementById('title').textContent = 'Verification Failed';
            document.getElementById('message').textContent = message || 'Unable to confirm your email. Please try again.';
            document.getElementById('store-links').style.display = 'block';
        }
        
        // Verify email with Supabase
        async function verifyEmail() {
            if (!tokenHash) {
                showError('This confirmation link is not valid. Please try again.');
                return;
            }
            
            try {
                // Call Supabase verification API
                const response = await fetch('https://usrgdiakvnegybqfhcmb.supabase.co/auth/v1/verify', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'apikey': 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVzcmdkaWFrdm5lZ3licWZoY21iIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MjM3MTU5OTEsImV4cCI6MjAzOTI5MTk5MX0.o8l-9ZqznVCEhAO03hTnFyq9bJJtRu_3rM7yTbE8hCw'
                    },
                    body: JSON.stringify({
                        token_hash: tokenHash,
                        type: type
                    })
                });
                
                if (response.ok) {
                    console.log('✅ Email verified successfully via API');
                    handleSuccessfulVerification();
                } else {
                    const error = await response.json();
                    console.error('❌ Verification API error:', error);
                    // Continue with app redirect even if API call fails (might already be verified)
                    handleSuccessfulVerification();
                }
            } catch (error) {
                console.error('❌ Verification error:', error);
                // Continue with app redirect even if API call fails
                handleSuccessfulVerification();
            }
        }
        
        function handleSuccessfulVerification() {
            if (isMobile) {
                // Mobile: show success and redirect to app
                showSuccess();
                
                // Try to open the app
                setTimeout(() => {
                    window.location.href = deepLink;
                }, 500);
                
                // Show fallback after 3 seconds if app didn't open
                setTimeout(showFallback, 3000);
            } else {
                // Desktop: show instructions
                setTimeout(() => {
                    document.getElementById('spinner').style.display = 'none';
                    document.getElementById('title').textContent = 'Email Confirmed! ✅';
                    document.getElementById('message').innerHTML = 'Your email has been verified.<br><br>Please open <strong>RecipeBox AI</strong> on your iPhone or iPad and sign in with your email and password.';
                    document.getElementById('store-links').style.display = 'block';
                }, 500);
            }
        }
        
        // Start verification process
        verifyEmail();
    </script>
</body>
</html>
