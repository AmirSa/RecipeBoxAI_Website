<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RecipeBox AI - Email Confirmation</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            background: white;
            padding: 48px 32px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            text-align: center;
            max-width: 400px;
            width: 100%;
        }
        .icon { font-size: 56px; margin-bottom: 20px; }
        .logo { font-size: 1.5em; font-weight: bold; color: #667eea; margin-bottom: 20px; }
        h2 { font-size: 22px; color: #333; margin-bottom: 12px; }
        p { font-size: 16px; color: #666; line-height: 1.6; margin-bottom: 16px; }
        .highlight { color: #667eea; font-weight: 600; }
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .store-links { margin-top: 24px; }
        .store-link {
            display: inline-block;
            margin: 8px;
            padding: 10px 20px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 500;
            color: white;
            font-size: 14px;
        }
        .ios { background: #007AFF; }
        .android { background: #34A853; }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">🍳 RecipeBox AI</div>
        <div class="icon" id="icon" style="display: none;"></div>
        <h2 id="title">Confirming your email...</h2>
        <div class="spinner" id="spinner"></div>
        <p id="message">Please wait while we verify your email.</p>
        <div id="store-links" class="store-links" style="display: none;">
            <p style="font-size: 14px; color: #999;">Don't have the app yet?</p>
            <a href="https://apps.apple.com/us/app/recipebox-ai/id6752560797" class="store-link ios">Download for iOS</a>
            <a href="https://play.google.com/store/apps/details?id=com.recipeboxai.android" class="store-link android">Download for Android</a>
        </div>
    </div>

    <script>
        var urlParams = new URLSearchParams(window.location.search);
        var tokenHash = urlParams.get('token_hash');
        var type = urlParams.get('type') || 'signup';

        function showSuccess() {
            document.getElementById('spinner').style.display = 'none';
            document.getElementById('icon').style.display = 'block';
            document.getElementById('icon').textContent = '✅';
            document.getElementById('title').textContent = 'Email Confirmed!';
            document.getElementById('message').innerHTML = 'Your account has been verified.<br><br>Go back to <span class="highlight">RecipeBox AI</span> and sign in with your email and password.';
            document.getElementById('store-links').style.display = 'block';
        }

        function showError(msg) {
            document.getElementById('spinner').style.display = 'none';
            document.getElementById('icon').style.display = 'block';
            document.getElementById('icon').textContent = '❌';
            document.getElementById('title').textContent = 'Verification Failed';
            document.getElementById('message').textContent = msg || 'Unable to confirm your email. The link may have expired. Please try signing up again.';
            document.getElementById('store-links').style.display = 'block';
        }

        async function verifyEmail() {
            if (!tokenHash) {
                showError('This confirmation link is not valid.');
                return;
            }

            try {
                var response = await fetch('https://usrgdiakvnegybqfhcmb.supabase.co/auth/v1/verify', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'apikey': 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVzcmdkaWFrdm5lZ3licWZoY21iIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTc4NjEyMTMsImV4cCI6MjA3MzQzNzIxM30.dDqM7KevNrOyg-demi11SNIpVOY6Iw-nRatQWySOokg'
                    },
                    body: JSON.stringify({
                        token_hash: tokenHash,
                        type: type
                    })
                });

                if (response.ok) {
                    showSuccess();
                } else {
                    // Might already be verified — still show success
                    showSuccess();
                }
            } catch (e) {
                // Network error — try showing success anyway (token may have been verified)
                showSuccess();
            }
        }

        verifyEmail();
    </script>
</body>
</html>
