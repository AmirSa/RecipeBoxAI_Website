<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Confirmed - RecipeBox AI</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            background: white;
            padding: 48px 32px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            text-align: center;
            max-width: 400px;
            width: 100%;
        }
        .icon { font-size: 56px; margin-bottom: 20px; }
        h2 { font-size: 24px; color: #333; margin-bottom: 12px; font-weight: 600; }
        p { font-size: 16px; color: #666; line-height: 1.6; margin-bottom: 16px; }
        .highlight { color: #667eea; font-weight: 600; }
        .store-links { margin-top: 24px; }
        .store-link {
            display: inline-block;
            margin: 8px;
            padding: 10px 20px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 500;
            color: white;
            font-size: 14px;
        }
        .ios { background: #007AFF; }
        .android { background: #34A853; }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">✅</div>
        <h2>Email Confirmed!</h2>
        <p>Your account has been verified successfully.</p>
        <p>Go back to <span class="highlight">RecipeBox AI</span> and sign in with your email and password.</p>
        <div class="store-links">
            <p style="font-size: 14px; color: #999;">Don't have the app yet?</p>
            <a href="https://apps.apple.com/us/app/recipebox-ai/id6752560797" class="store-link ios">Download for iOS</a>
            <a href="https://play.google.com/store/apps/details?id=com.recipeboxai.android" class="store-link android">Download for Android</a>
        </div>
    </div>
</body>
</html>
